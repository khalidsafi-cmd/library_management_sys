{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card login-card shadow-lg mt-5">
            <div class="card-header login-header bg-warning text-white">
                <h3 class="text-center mb-0">
                    <i class="fas fa-edit me-2"></i>Edit Book
                </h3>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-heading"></i>
                            </span>
                            <input type="text" class="form-control" id="title" name="title"
                                   value="{{ book.title }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="author" class="form-label">Author</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-user-edit"></i>
                            </span>
                            <input type="text" class="form-control" id="author" name="author"
                                   value="{{ book.author }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="year" class="form-label">Publication Year</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-calendar-alt"></i>
                            </span>
                            <input type="number" class="form-control" id="year" name="year"
                                   value="{{ book.year }}" min="1000" max="{{ current_year }}" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="language" class="form-label">Language</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-language"></i>
                            </span>
                            <input type="text" class="form-control" id="language" name="language"
                                   value="{{ book.language }}" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning btn-login text-white">
                            <i class="fas fa-save me-2"></i>Update Book
                        </button>
                        <a href="{{ url_for('book.index') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-times me-2"></i>Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
